# Internal load balancer for tenant-server replicas (production).
# Host nginx (SSL) -> this nginx (LB) -> app:3000 (N replicas)
#
# Uses ip_hash for sticky sessions — same client IP always hits the same
# tenant server. Run `nginx -s reload` after replica counts change.

# Docker's embedded DNS
resolver 127.0.0.11 valid=5s;

# Sticky sessions via ip_hash:
#   - Tenant DB connections reused (not duplicated across servers)
#   - Route-level cache hits stay consistent
#   - WebSocket upgrades land on the same server as the initial HTTP
upstream app_backend {
    ip_hash;
    server app:3000;
}

server {
    listen 80;
    server_name _;

    # Match host nginx limit for file uploads
    client_max_body_size 500M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    client_body_timeout 60s;
    client_header_timeout 30s;
    send_timeout 60s;

    location / {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Pass through headers from host nginx — don't overwrite with Docker IPs
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # Disable buffering for streaming/SSE
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;

        # Proxy next upstream on error (try another replica)
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    # Readiness check — returns 200 only when app can serve traffic
    location /ready {
        access_log off;
        proxy_pass http://app_backend/api/ready;
    }

    # Full health check — DB, Redis, connection stats
    location /health {
        access_log off;
        proxy_pass http://app_backend/api/health;
    }
}
